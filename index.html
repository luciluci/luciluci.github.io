<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Event Registration • Timeline Grid</title>

	<style>
		:root {
			--bg: #ffffff;
			--page: #fbfcfe;
			--text: #0f172a;
			--muted: #64748b;
			--line: #e2e8f0;
			--card: #ffffff;
			--shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
			--brand: #ff7a1a;
			--brand2: #ff9b4a;
			--pill: #f8fafc;
			--radius: 18px;
			--max: 1180px;

			--railW: 64px;
			--rightOffset: 50px; /* 👈 requested: right column sits 50px lower */
		}

		* { box-sizing: border-box; }
		html, body { height: 100%; }
		body {
			margin: 0;
			font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
			Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
			color: var(--text);
			background: var(--page);
		}

		.page {
			max-width: var(--max);
			margin: 0 auto;
			padding: 28px 18px 64px;
		}

		/* ---------- top bar ---------- */
		.topbar { display: grid; gap: 14px; }
		.topbar__row {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			align-items: center;
			justify-content: space-between;
		}

		.filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

		.pill {
			appearance: none;
			border: 1px solid var(--line);
			background: var(--pill);
			color: var(--text);
			padding: 9px 12px;
			border-radius: 999px;
			font-size: 14px;
			cursor: pointer;
			line-height: 1;
			user-select: none;
		}
		.pill[aria-pressed="true"] {
			border-color: rgba(255, 122, 26, 0.35);
			background: rgba(255, 122, 26, 0.08);
			color: #7a2e00;
		}

		.controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

		.select, .search {
			display: flex;
			align-items: center;
			gap: 10px;
			border: 1px solid var(--line);
			background: var(--bg);
			border-radius: 999px;
			padding: 9px 12px;
			min-height: 38px;
		}
		.select select { border: 0; outline: 0; background: transparent; font-size: 14px; color: var(--text); }
		.search input { border: 0; outline: 0; width: min(340px, 70vw); font-size: 14px; }
		.icon { width: 18px; height: 18px; color: var(--muted); flex: 0 0 auto; }

		/* ---------- timeline grid ---------- */
		.timeline {
			margin-top: 22px;
			display: grid;
			grid-template-columns: 1fr var(--railW) 1fr;
			gap: 26px;
			align-items: start;
		}

		.col {
			display: grid;
			gap: 26px;
			align-content: start;
		}

		/* 👇 requested: right grid sits lower */
		.col--right {
			margin-top: var(--rightOffset);
		}

		.timeline__rail {
			position: relative;
			display: block;
			min-height: 10px; /* JS will adjust */
		}
		.timeline__rail::before {
			content: "";
			position: absolute;
			top: 0;
			bottom: 0;
			left: 50%;
			width: 2px;
			background: var(--line);
			transform: translateX(-50%);
			border-radius: 2px;
		}

		.rail-marker {
			position: absolute;
			left: 50%;
			transform: translateX(-50%);
			display: grid;
			gap: 6px;
			place-items: center;
			pointer-events: none;
		}

		.rail-dot {
			width: 14px;
			height: 14px;
			border-radius: 50%;
			background: var(--bg);
			border: 3px solid #94a3b8;
			box-shadow: 0 4px 12px rgba(2, 6, 23, 0.08);
		}
		.rail-dot--accent { border-color: var(--brand); }

		.rail-label {
			font-size: 12px;
			color: var(--muted);
			background: rgba(251, 252, 254, 0.92);
			padding: 3px 8px;
			border-radius: 999px;
			border: 1px solid var(--line);
			white-space: nowrap;
		}

		/* ---------- card ---------- */
		.card {
			background: var(--card);
			border: 1px solid rgba(226, 232, 240, 0.9);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			overflow: hidden;
		}
		.card__media { position: relative; aspect-ratio: 16 / 9; background: #e2e8f0; }
		.card__media img { width: 100%; height: 100%; object-fit: cover; display: block; }

		.badge {
			position: absolute;
			top: 12px;
			left: 12px;
			display: inline-flex;
			gap: 8px;
			align-items: center;
			padding: 8px 10px;
			border-radius: 999px;
			background: rgba(15, 23, 42, 0.72);
			color: #fff;
			font-size: 12px;
			backdrop-filter: blur(6px);
		}
		.badge__dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand); }

		.card__body { padding: 16px 16px 18px; text-align: center; }
		.card__kicker { color: var(--muted); font-size: 13px; margin: 0 0 6px; }
		.card__title { margin: 0; font-size: 18px; letter-spacing: 0.2px; }

		.card__meta {
			margin-top: 10px;
			display: grid;
			gap: 6px;
			color: var(--muted);
			font-size: 13px;
		}

		.card__cta { margin-top: 14px; display: flex; justify-content: center; }

		.btn {
			display: inline-flex;
			gap: 10px;
			align-items: center;
			justify-content: center;
			border: 0;
			cursor: pointer;
			font-weight: 600;
			font-size: 14px;
			padding: 12px 16px;
			border-radius: 999px;
			color: #fff;
			background: linear-gradient(135deg, var(--brand), var(--brand2));
			box-shadow: 0 10px 18px rgba(255, 122, 26, 0.25);
			text-decoration: none;
			min-width: 220px;
		}

		/* ---------- modal ---------- */
		.modal {
			position: fixed;
			inset: 0;
			display: none;
			place-items: center;
			padding: 18px;
			background: rgba(2, 6, 23, 0.55);
			z-index: 1000;
		}
		.modal[aria-hidden="false"] { display: grid; }

		.modal__panel {
			width: min(560px, 96vw);
			background: var(--bg);
			border-radius: 20px;
			box-shadow: 0 25px 70px rgba(2, 6, 23, 0.35);
			border: 1px solid rgba(226, 232, 240, 0.9);
			overflow: hidden;
		}

		.modal__header {
			padding: 16px 16px 10px;
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 12px;
			border-bottom: 1px solid var(--line);
			background: linear-gradient(180deg, rgba(255, 122, 26, 0.10), transparent);
		}

		.modal__titleWrap { display: grid; gap: 4px; }
		.modal__title { margin: 0; font-size: 18px; }
		.modal__subtitle { margin: 0; color: var(--muted); font-size: 13px; }

		.iconBtn {
			appearance: none;
			border: 1px solid var(--line);
			background: var(--bg);
			border-radius: 999px;
			width: 38px;
			height: 38px;
			display: inline-grid;
			place-items: center;
			cursor: pointer;
		}

		.modal__body { padding: 14px 16px 16px; display: grid; gap: 12px; }
		.formRow { display: grid; gap: 6px; text-align: left; }
		.formRow label { font-size: 13px; color: var(--muted); }
		.formRow input, .formRow select, .formRow textarea {
			width: 100%;
			border: 1px solid var(--line);
			border-radius: 12px;
			padding: 10px 12px;
			font-size: 14px;
			outline: none;
			background: var(--bg);
		}

		.modal__footer {
			padding: 14px 16px 16px;
			display: flex;
			gap: 10px;
			justify-content: flex-end;
			border-top: 1px solid var(--line);
		}

		.btnSecondary {
			background: var(--bg);
			color: var(--text);
			border: 1px solid var(--line);
			box-shadow: none;
			min-width: auto;
		}

		.toast {
			display: none;
			margin-top: 6px;
			padding: 10px 12px;
			border-radius: 12px;
			border: 1px solid rgba(16, 185, 129, 0.35);
			background: rgba(16, 185, 129, 0.10);
			color: #065f46;
			font-size: 13px;
		}
		.toast.is-show { display: block; }

		/* ---------- responsive ---------- */
		@media (max-width: 940px) {
			.timeline { grid-template-columns: 1fr; }
			.timeline__rail { display: none; }
			.col--right { margin-top: 0; }
		}
	</style>
</head>

<body>
<main class="page">
	<header class="topbar" aria-label="Event filters">
		<div class="topbar__row">
			<div class="filters" role="toolbar" aria-label="Categories">
				<button class="pill" type="button" data-filter="featured" aria-pressed="true">Featured</button>
				<button class="pill" type="button" data-filter="workshop" aria-pressed="false">Workshops</button>
				<button class="pill" type="button" data-filter="meetup" aria-pressed="false">Meetups</button>
				<button class="pill" type="button" data-filter="all" aria-pressed="false">All events</button>
			</div>

			<div class="controls" aria-label="Search and time range">
				<label class="select" aria-label="Time range">
					<svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<path d="M7 2v3M17 2v3M3.5 9h17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
						<path d="M6.5 6h11A3.5 3.5 0 0 1 21 9.5v9A3.5 3.5 0 0 1 17.5 22h-11A3.5 3.5 0 0 1 3 18.5v-9A3.5 3.5 0 0 1 6.5 6Z" stroke="currentColor" stroke-width="2"/>
					</svg>
					<select id="timeRange">
						<option value="all" selected>All time</option>
						<option value="30">Next 30 days</option>
						<option value="90">Next 90 days</option>
						<option value="365">This year</option>
					</select>
				</label>

				<label class="search" aria-label="Search events">
					<svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<path d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z" stroke="currentColor" stroke-width="2"/>
						<path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
					</svg>
					<input id="searchBox" type="search" placeholder="Search events…" />
				</label>
			</div>
		</div>
	</header>

	<section class="timeline" aria-label="Events timeline">
		<div class="col col--left" id="leftCol"></div>
		<div class="timeline__rail" aria-hidden="true" id="rail"></div>
		<div class="col col--right" id="rightCol"></div>
	</section>
</main>

<!-- Modal -->
<div class="modal" id="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
	<div class="modal__panel" role="document">
		<div class="modal__header">
			<div class="modal__titleWrap">
				<h2 class="modal__title" id="modalTitle">Register</h2>
				<p class="modal__subtitle" id="modalSubtitle">Event details</p>
			</div>
			<button class="iconBtn" type="button" id="modalClose" aria-label="Close">
				<svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
					<path d="M6 6l12 12M18 6l-12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
				</svg>
			</button>
		</div>

		<form class="modal__body" id="regForm">
			<div class="formRow">
				<label for="fullName">Full name</label>
				<input id="fullName" name="fullName" placeholder="e.g. Sebastian Popescu" required />
			</div>

			<div class="formRow">
				<label for="email">Email</label>
				<input id="email" name="email" type="email" placeholder="you@example.com" required />
			</div>

			<div class="formRow">
				<label for="ticketType">Ticket type</label>
				<select id="ticketType" name="ticketType">
					<option>Standard</option>
					<option>VIP</option>
					<option>Student</option>
				</select>
			</div>

			<div class="formRow">
				<label for="note">Note (optional)</label>
				<textarea id="note" name="note" rows="3" placeholder="Anything we should know?"></textarea>
			</div>

			<div class="toast" id="toast" role="status" aria-live="polite"></div>
		</form>

		<div class="modal__footer">
			<button class="btn btnSecondary" type="button" id="modalCancel">Cancel</button>
			<button class="btn" type="submit" form="regForm">Submit registration</button>
		</div>
	</div>
</div>

<script>
	/**
	 * Key change requested:
	 * - Right column is physically shifted down by 50px (CSS).
	 * - The timeline dot for a right-column card must match that shifted position.
	 *
	 * Implementation:
	 * - We render cards alternating left/right.
	 * - When building the rail, we compute each card's dot Y based on real DOM position,
	 *   not only on date ratio.
	 * - Then we apply a date-based "target" as a soft guide by using the rail label spacing,
	 *   but the dot itself aligns exactly to the card's vertical center.
	 *
	 * The month labels still use date-based offsets.
	 */

	const RIGHT_OFFSET_PX = 50;

	const EVENTS = [
		{
			id: "ev-101",
			title: "Build & Ship Weekend (2-day)",
			kicker: "Community Summit • Bucharest",
			category: "featured",
			location: "Bucharest",
			startDate: "2026-08-28",
			endDate: "2026-08-31",
			priceLabel: "99 RON • Includes snacks",
			badge: "Featured • Limited seats",
			image: "https://picsum.photos/seed/event-aug/1200/675",
			alt: "People networking at a bright conference lobby",
		},
		{
			id: "ev-102",
			title: "Summer Mixer + Lightning Talks",
			kicker: "Product & Tech Night",
			category: "meetup",
			location: "Cluj-Napoca",
			startDate: "2026-07-03",
			endDate: "2026-07-03",
			priceLabel: "69 RON • 1 drink included",
			badge: "Meetup • Networking",
			image: "https://picsum.photos/seed/event-july/1200/675",
			alt: "Happy attendees at an outdoor meetup",
		},
		{
			id: "ev-103",
			title: "UI Patterns for Fast Teams",
			kicker: "Frontend Workshop",
			category: "workshop",
			location: "Timișoara",
			startDate: "2026-06-10",
			endDate: "2026-06-10",
			priceLabel: "Free • RSVP required",
			badge: "Workshop • Hands-on",
			image: "https://picsum.photos/seed/event-june/1200/675",
			alt: "Workshop table with laptops and notebooks",
		},
		{
			id: "ev-104",
			title: "Component Library Kickoff (Half-day)",
			kicker: "Design Systems",
			category: "featured",
			location: "Iași",
			startDate: "2026-06-22",
			endDate: "2026-06-22",
			priceLabel: "149 RON • Early bird until 1 Jun",
			badge: "Featured • Early bird",
			image: "https://picsum.photos/seed/event-june2/1200/675",
			alt: "Modern building entrance where an event takes place",
		},
		{
			id: "ev-105",
			title: "Practical API Validation (with examples)",
			kicker: "Backend Workshop",
			category: "workshop",
			location: "Bucharest",
			startDate: "2026-07-18",
			endDate: "2026-07-18",
			priceLabel: "129 RON • Q&A included",
			badge: "Workshop • Real-world",
			image: "https://picsum.photos/seed/event-api/1200/675",
			alt: "Speaker presenting to an audience",
		},
		{
			id: "ev-106",
			title: "Founder Coffee Chats",
			kicker: "Casual Meetup",
			category: "meetup",
			location: "Bucharest",
			startDate: "2026-08-07",
			endDate: "2026-08-07",
			priceLabel: "Free • Limited places",
			badge: "Meetup • Casual",
			image: "https://picsum.photos/seed/event-coffee/1200/675",
			alt: "Coffee cups on a table during a meetup",
		},
	];

	const state = { category: "featured", query: "", rangeDays: "all", selectedEventId: null };

	const leftCol = document.getElementById("leftCol");
	const rightCol = document.getElementById("rightCol");
	const rail = document.getElementById("rail");

	const searchBox = document.getElementById("searchBox");
	const timeRange = document.getElementById("timeRange");

	const modal = document.getElementById("modal");
	const modalTitle = document.getElementById("modalTitle");
	const modalSubtitle = document.getElementById("modalSubtitle");
	const modalClose = document.getElementById("modalClose");
	const modalCancel = document.getElementById("modalCancel");
	const regForm = document.getElementById("regForm");
	const toast = document.getElementById("toast");

	function parseISO(dateStr) {
		const [y, m, d] = dateStr.split("-").map(Number);
		return new Date(y, m - 1, d);
	}

	function formatDateRange(startISO, endISO) {
		const start = parseISO(startISO);
		const end = parseISO(endISO);
		const fmt = new Intl.DateTimeFormat(undefined, { day: "2-digit", month: "short", year: "numeric" });
		if (startISO === endISO) return fmt.format(start);
		return `${fmt.format(start)} – ${fmt.format(end)}`;
	}

	function textIncludes(h, n) { return h.toLowerCase().includes(n.trim().toLowerCase()); }

	function withinRange(eventStartISO, rangeDays) {
		if (rangeDays === "all") return true;
		const now = new Date();
		const start = parseISO(eventStartISO);
		const ms = start.getTime() - now.getTime();
		const days = ms / (1000 * 60 * 60 * 24);
		return days >= -1 && days <= Number(rangeDays);
	}

	function getVisibleEvents() {
		return EVENTS
				.slice()
				.sort((a, b) => parseISO(b.startDate) - parseISO(a.startDate))
				.filter((ev) => {
					const catOk = state.category === "all" ? true : ev.category === state.category;

					const q = state.query.trim();
					const queryOk =
							q.length === 0
									? true
									: textIncludes(ev.title, q) || textIncludes(ev.kicker, q) || textIncludes(ev.location, q);

					const rangeOk = withinRange(ev.startDate, state.rangeDays);
					return catOk && queryOk && rangeOk;
				});
	}

	function createCard(ev, side) {
		const article = document.createElement("article");
		article.className = "card";
		article.dataset.eventId = ev.id;
		article.dataset.startDate = ev.startDate;
		article.dataset.side = side; // left | right

		article.innerHTML = `
          <div class="card__media">
            <img src="${ev.image}" alt="${ev.alt}" />
            <div class="badge"><span class="badge__dot" aria-hidden="true"></span>${ev.badge}</div>
          </div>

          <div class="card__body">
            <p class="card__kicker">${ev.kicker}</p>
            <h3 class="card__title">${ev.title}</h3>

            <div class="card__meta">
              <div><strong>Dates:</strong> ${formatDateRange(ev.startDate, ev.endDate)}</div>
              <div><strong>Location:</strong> ${ev.location}</div>
              <div><strong>Price:</strong> ${ev.priceLabel}</div>
            </div>

            <div class="card__cta">
              <button class="btn" type="button" data-action="register" data-event-id="${ev.id}">
                Register now
                <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
        `;
		return article;
	}

	// Month label helpers
	const monthKey = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
	const monthTitle = (d) => new Intl.DateTimeFormat(undefined, { month: "short", year: "numeric" }).format(d);

	function renderRail(visibleEvents) {
		rail.innerHTML = "";
		if (visibleEvents.length === 0) {
			rail.style.minHeight = "0px";
			return;
		}

		// Rail height should match the whole "visual block" including right offset.
		const leftH = leftCol.scrollHeight;
		const rightH = rightCol.scrollHeight + RIGHT_OFFSET_PX;
		const railHeight = Math.max(leftH, rightH);
		rail.style.minHeight = railHeight + "px";

		// ---- 1) Place dots MATCHED to cards (so the 50px right offset is reflected automatically)
		// We compute the Y of each card's center relative to the rail top.
		const railRect = rail.getBoundingClientRect();

		// Build lookup: eventId -> card element
		const cards = Array.from(document.querySelectorAll('.card[data-event-id]'));
		const cardById = new Map(cards.map((c) => [c.dataset.eventId, c]));

		for (const ev of visibleEvents) {
			const card = cardById.get(ev.id);
			if (!card) continue;

			const cardRect = card.getBoundingClientRect();
			const cardCenterY = cardRect.top + cardRect.height / 2;

			// top position within rail
			const top = Math.round(cardCenterY - railRect.top);

			const marker = document.createElement("div");
			marker.className = "rail-marker";
			marker.style.top = `${Math.max(0, Math.min(railHeight - 1, top))}px`;

			const dot = document.createElement("div");
			dot.className = "rail-dot" + (ev.category === "featured" ? " rail-dot--accent" : "");
			dot.title = `${ev.title} • ${ev.startDate}`;

			marker.appendChild(dot);
			rail.appendChild(marker);
		}

		// ---- 2) Month labels remain DATE-BASED (like your screenshot "Jul 2025", "Aug 2025")
		const times = visibleEvents.map((ev) => parseISO(ev.startDate).getTime());
		const min = Math.min(...times);
		const max = Math.max(...times);
		const span = Math.max(1, max - min);

		const monthMap = new Map();
		for (const ev of visibleEvents) {
			const d = parseISO(ev.startDate);
			const k = monthKey(d);
			const t = d.getTime();
			if (!monthMap.has(k)) monthMap.set(k, { date: d, time: t });
		}

		const months = Array.from(monthMap.values()).sort((a, b) => a.time - b.time);
		for (const m of months) {
			const ratio = (m.time - min) / span;
			const top = Math.round(ratio * (railHeight - 1));

			const labelWrap = document.createElement("div");
			labelWrap.className = "rail-marker";
			labelWrap.style.top = `${Math.max(0, top - 18)}px`;

			const label = document.createElement("div");
			label.className = "rail-label";
			label.textContent = monthTitle(m.date);

			labelWrap.appendChild(label);
			rail.appendChild(labelWrap);
		}
	}

	function render() {
		const visible = getVisibleEvents();
		leftCol.innerHTML = "";
		rightCol.innerHTML = "";

		visible.forEach((ev, idx) => {
			const side = idx % 2 === 0 ? "left" : "right";
			const card = createCard(ev, side);
			(side === "left" ? leftCol : rightCol).appendChild(card);
		});

		// Important: wait a frame so layout is final before reading getBoundingClientRect()
		requestAnimationFrame(() => renderRail(visible));
	}

	function setActivePill(filterValue) {
		document.querySelectorAll(".pill[data-filter]").forEach((btn) => {
			btn.setAttribute("aria-pressed", String(btn.dataset.filter === filterValue));
		});
	}

	document.querySelector(".filters").addEventListener("click", (e) => {
		const btn = e.target.closest(".pill[data-filter]");
		if (!btn) return;
		state.category = btn.dataset.filter;
		setActivePill(state.category);
		render();
	});

	searchBox.addEventListener("input", (e) => {
		state.query = e.target.value;
		render();
	});

	timeRange.addEventListener("change", (e) => {
		state.rangeDays = e.target.value;
		render();
	});

	// ----- modal -----
	let lastFocusedEl = null;

	function openModalForEvent(eventId) {
		const ev = EVENTS.find((x) => x.id === eventId);
		if (!ev) return;

		state.selectedEventId = eventId;
		modalTitle.textContent = `Register: ${ev.title}`;
		modalSubtitle.textContent = `${formatDateRange(ev.startDate, ev.endDate)} • ${ev.location} • ${ev.priceLabel}`;

		toast.classList.remove("is-show");
		toast.textContent = "";

		lastFocusedEl = document.activeElement;
		modal.setAttribute("aria-hidden", "false");

		const first = modal.querySelector("input, select, textarea, button");
		if (first) first.focus();
	}

	function closeModal() {
		modal.setAttribute("aria-hidden", "true");
		state.selectedEventId = null;
		if (lastFocusedEl && typeof lastFocusedEl.focus === "function") lastFocusedEl.focus();
	}

	document.addEventListener("click", (e) => {
		const btn = e.target.closest('[data-action="register"]');
		if (btn) openModalForEvent(btn.dataset.eventId);
	});

	document.getElementById("modalClose").addEventListener("click", closeModal);
	document.getElementById("modalCancel").addEventListener("click", closeModal);

	modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

	document.addEventListener("keydown", (e) => {
		const isOpen = modal.getAttribute("aria-hidden") === "false";
		if (!isOpen) return;
		if (e.key === "Escape") closeModal();
	});

	regForm.addEventListener("submit", (e) => {
		e.preventDefault();
		const ev = EVENTS.find((x) => x.id === state.selectedEventId);
		const data = Object.fromEntries(new FormData(regForm).entries());

		toast.textContent = `✅ Thanks, ${data.fullName || "friend"}! You're registered for "${ev?.title ?? "this event"}". (Demo only)`;
		toast.classList.add("is-show");
		regForm.reset();

		// Re-render so the rail stays accurate even if fonts/layout shift slightly
		requestAnimationFrame(render);
	});

	// init
	setActivePill(state.category);
	render();

	// keep dots aligned on resize (and when layout changes)
	window.addEventListener("resize", () => render());
</script>
</body>
</html>
